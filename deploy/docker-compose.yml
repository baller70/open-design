name: open-design

services:
  open-design:
    container_name: open-design
    image: ${OPEN_DESIGN_IMAGE:-ghcr.io/nexu-io/od:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=192}
      OD_BIND_HOST: 0.0.0.0
      OD_ALLOWED_ORIGINS: ${OPEN_DESIGN_ALLOWED_ORIGINS:-}
      OD_PORT: 7456
      OD_WEB_PORT: ${OPEN_DESIGN_PORT:-7456}
      OD_API_TOKEN: ${OD_API_TOKEN:-}
      OD_DISABLE_API_AUTH: ${OPEN_DESIGN_DISABLE_API_AUTH:-}
      OD_CODEX_SANDBOX: ${OD_CODEX_SANDBOX:-}
      HOME: /home/open-design
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      OD_MINIMAX_API_KEY: ${OD_MINIMAX_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      VELA_BIN: /opt/vela-cli/vela
      OPEN_DESIGN_VELA_CLI_BIN: /opt/vela-cli/vela
      PATH: /opt/vela-cli:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - "127.0.0.1:${OPEN_DESIGN_PORT:-7456}:7456"
    volumes:
      - open_design_data:/app/.od
      - open_design_home:/home/open-design
      - /opt/apps/contenthub-vendor/open-design/vela-runtime/node_modules/@powerformer/vela-cli-linux-x64/bin:/opt/vela-cli:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: ${OPEN_DESIGN_MEM_LIMIT:-384m}
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  open_design_data:
  open_design_home:
